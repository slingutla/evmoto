<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulsePick AI | Smart Recommendations in Seconds</title>
  <style>
    :root {
      --bg1: #0b1220;
      --bg2: #172a45;
      --accent: #22c55e;
      --accent2: #f59e0b;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --card: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, #1d4ed8 0%, transparent 30%),
        radial-gradient(circle at 85% 10%, #15803d 0%, transparent 30%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .container {
      width: min(980px, 100%);
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      backdrop-filter: blur(8px);
    }
    h1 { margin: 0 0 12px; font-size: clamp(1.8rem, 4vw, 3rem); line-height: 1.1; }
    p { color: var(--muted); line-height: 1.5; }
    .pill {
      display: inline-block;
      background: rgba(34, 197, 94, 0.16);
      color: #bbf7d0;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    form { display: grid; gap: 10px; margin-top: 16px; }
    input, select, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-size: 1rem;
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }
    button {
      cursor: pointer;
      border: none;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #081220;
      font-weight: 700;
    }
    .result {
      margin-top: 12px;
      font-weight: 600;
      color: #bbf7d0;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="card">
      <span class="pill">Private Beta</span>
      <h1>Turn intent into the right product, instantly.</h1>
      <p>PulsePick AI recommends the best product for each customer based on goals, budget, and taste. Join the waitlist to access the beta.</p>
      <form id="signup-form">
        <input type="email" id="email" name="email" placeholder="you@company.com" required />
        <button type="submit">Join Waitlist</button>
      </form>
      <div class="result" id="signup-result"></div>
    </section>

    <section class="card">
      <h2>AI Recommendation Prototype</h2>
      <p>Try a simple recommender using budget + preference.</p>
      <form id="reco-form">
        <select id="category" name="category" required>
          <option value="">Choose category</option>
          <option value="headphones">Headphones</option>
          <option value="laptop">Laptop</option>
          <option value="running-shoes">Running Shoes</option>
        </select>
        <input type="number" id="budget" name="budget" placeholder="Budget in USD" required min="50" />
        <input type="text" id="preference" name="preference" placeholder="Preference (e.g. noise canceling)" required />
        <button type="submit">Get Recommendation</button>
      </form>
      <div class="result" id="reco-result"></div>
    </section>
  </div>

  <script>
    const signupForm = document.getElementById("signup-form");
    const signupResult = document.getElementById("signup-result");
    const recoForm = document.getElementById("reco-form");
    const recoResult = document.getElementById("reco-result");

    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      signupResult.textContent = "Submitting...";
      const email = document.getElementById("email").value;
      const button = signupForm.querySelector("button");
      button.disabled = true;
      try {
        const res = await fetch("/api/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        signupResult.textContent = data.message || "Saved.";
        if (res.ok) signupForm.reset();
      } catch {
        signupResult.textContent = "Network error. Please try again.";
      } finally {
        button.disabled = false;
      }
    });

    recoForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      recoResult.textContent = "Thinking...";
      const category = document.getElementById("category").value;
      const budget = Number(document.getElementById("budget").value);
      const preference = document.getElementById("preference").value;

      const button = recoForm.querySelector("button");
      button.disabled = true;
      try {
        const res = await fetch("/api/recommend", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ category, budget, preference })
        });
        const data = await res.json();
        recoResult.textContent = data.recommendation || data.message || "No result.";
      } catch {
        recoResult.textContent = "Network error. Please try again.";
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
